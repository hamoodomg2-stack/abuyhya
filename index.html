<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mohamad Mezyak Finanz" />
  <meta name="theme-color" content="#F7F5F2" />
  <title>Mohamad Mezyak Finanz</title>
  <link rel="manifest" href="manifest.json" />
  <!-- React + Babel from CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; padding: 0; background: #F7F5F2; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- App source is loaded from app.jsx, transpiled in browser -->
  <script type="text/babel" src="app.jsx" data-type="module"></script>
  <script>
    // Register service worker for offline use
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
